<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期货盈亏计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .calculator-container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            /* 容器入场动画 */
            animation: fadeInUp 0.8s ease-out;
        }

        /* 入场动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 按钮/输入框hover动效 */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #2d3748;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            /* 标题渐变文字 */
            background: linear-gradient(90deg, #4299e1, #38b2ac);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .input-group {
            margin-bottom: 20px;
            /* 输入组渐入 */
            animation: fadeInUp 0.8s ease-out;
            animation-delay: calc(var(--i) * 0.1s);
            opacity: 0;
            animation-fill-mode: forwards;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 500;
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #4299e1;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
            transform: translateY(-2px);
        }

        select:hover, input:hover {
            border-color: #9f7aea;
            animation: pulse 1.5s infinite;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8f9fa;
            text-align: center;
            /* 结果区域动效 */
            transition: all 0.5s ease;
            animation: fadeInUp 0.8s ease-out;
            animation-delay: 0.5s;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        .result:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.15);
        }

        .result h2 {
            font-size: 28px;
            margin-bottom: 10px;
            /* 数字变化动效 */
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .profit {
            color: #48bb78;
        }

        .loss {
            color: #e53e3e;
        }

        .neutral {
            color: #718096;
        }

        .formula {
            margin-top: 15px;
            font-size: 14px;
            color: #718096;
            font-style: italic;
        }

        /* 品种规格说明 */
        .specs {
            margin-top: 25px;
            padding: 15px;
            background-color: #f0f8fb;
            border-radius: 8px;
            font-size: 14px;
            color: #2d3748;
            /* 规格说明动效 */
            animation: fadeInUp 0.8s ease-out;
            animation-delay: 0.7s;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        .specs h3 {
            margin-bottom: 10px;
            color: #2d3748;
            font-size: 16px;
        }

        .specs ul {
            list-style-type: none;
            line-height: 1.6;
        }

        .specs li {
            margin-bottom: 5px;
            /* 列表项hover效果 */
            transition: padding-left 0.3s ease;
        }

        .specs li:hover {
            padding-left: 8px;
            color: #4299e1;
        }

        /* 浏览量统计样式 */
        .visitor-count {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: #718096;
            padding: 8px 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            animation: fadeInUp 0.8s ease-out;
            animation-delay: 0.3s;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        .visitor-count span {
            color: #4299e1;
            font-weight: 600;
        }

        /* 页尾样式 */
        footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            font-size: 14px;
            color: #718096;
            animation: fadeInUp 0.8s ease-out;
            animation-delay: 0.9s;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        footer .creator {
            font-weight: 500;
            color: #4299e1;
        }

        footer p {
            margin-top: 5px;
        }

    </style>
    <!-- 集成免费的访问量统计（不蒜子） -->
    <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</head>
<body>
    <div class="calculator-container">
        <h1>期货盈亏计算器 (美元)</h1>
        
        <!-- 浏览量统计区域 -->
        <div class="visitor-count">
            总访问量: <span id="busuanzi_value_site_pv"></span> | 
            今日访问: <span id="busuanzi_value_page_pv"></span>
        </div>
        
        <div class="input-group" style="--i: 1;">
            <label for="symbol">选择品种</label>
            <select id="symbol" onchange="calculateProfitLoss()">
                <option value="xauusd">XAUUSD (黄金/美元)</option>
                <option value="usdjpy">USDJPY (美元/日元)</option>
                <option value="usoil">USOIL (美国原油)</option>
                <option value="btcusd">BTCUSD (比特币/美元)</option>
                <option value="ethusd">ETHUSD (以太坊/美元)</option>
            </select>
        </div>

        <div class="input-group" style="--i: 2;">
            <label for="lots">手数 (标准手)</label>
            <input type="number" id="lots" min="0.01" step="0.01" value="1" oninput="calculateProfitLoss()" placeholder="输入手数，例如：1、0.5、0.1">
        </div>

        <div class="input-group" style="--i: 3;">
            <label for="points">波动点数 (盈利为正，亏损为负)</label>
            <input type="number" id="points" step="0.01" value="10" oninput="calculateProfitLoss()" placeholder="例如：盈利10点填10，亏损5点填-5">
        </div>

        <div class="result" id="result">
            <h2 class="neutral">请输入数值进行计算</h2>
            <div class="formula" id="formula"></div>
        </div>

        <div class="specs">
            <h3>品种规格说明 (每标准手每点价值)</h3>
            <ul>
                <li>• XAUUSD (黄金): 1点 = $100 美元/手</li>
                <li>• USDJPY (美日): 1点 = $6.45 美元/手 (按155汇率计算)</li>
                <li>• USOIL (美原油): 1点 = $10 美元/手</li>
                <li>• BTCUSD (比特币): 1点 = $1 美元/手</li>
                <li>• ETHUSD (以太坊): 1点 = $0.1 美元/手</li>
            </ul>
        </div>

        <!-- 页尾 - 创作者信息 -->
        <footer>
            <span class="creator">创作者：李伟哲</span>
            <p>期货盈亏计算器 | 仅供参考</p>
        </footer>
    </div>

    <script>
        // 定义每个品种的点值（每标准手每点的美元价值）
        const pointValues = {
            xauusd: 100,   // 黄金 1点 = $100
            usdjpy: 6.45,  // 美日 1点 = $6.45 (按155汇率计算，1000/155≈6.45)
            usoil: 10,     // 美原油 1点 = $10
            btcusd: 1,     // 比特币 1点 = $1
            ethusd: 0.1    // 以太坊 1点 = $0.1
        };

        // 计算盈亏的核心函数
        function calculateProfitLoss() {
            // 获取用户输入
            const symbol = document.getElementById('symbol').value;
            const lots = parseFloat(document.getElementById('lots').value) || 0;
            const points = parseFloat(document.getElementById('points').value) || 0;

            // 获取该品种的点值
            const pointValue = pointValues[symbol];
            
            // 计算盈亏金额
            const profitLoss = lots * points * pointValue;
            
            // 获取结果展示元素
            const resultElement = document.getElementById('result').querySelector('h2');
            const formulaElement = document.getElementById('formula');
            
            // 结果数字变化动效
            resultElement.style.transform = 'scale(1.1)';
            setTimeout(() => {
                resultElement.style.transform = 'scale(1)';
            }, 300);
            
            // 更新结果显示
            resultElement.textContent = `$${profitLoss.toFixed(2)}`;
            
            // 设置盈亏颜色
            if (profitLoss > 0) {
                resultElement.className = 'profit';
            } else if (profitLoss < 0) {
                resultElement.className = 'loss';
            } else {
                resultElement.className = 'neutral';
            }

            // 显示计算公式
            const symbolName = document.getElementById('symbol').options[document.getElementById('symbol').selectedIndex].text;
            formulaElement.textContent = `计算公式: ${lots} 手 × ${points} 点 × ${pointValue} 美元/手/点 = ${profitLoss.toFixed(2)} 美元 (${symbolName})`;
        }

        // 页面加载完成后初始化计算
        window.onload = function() {
            calculateProfitLoss();
        };
    </script>
</body>
</html>
